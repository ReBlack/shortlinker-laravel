name: shortlinker_laravel

services:
  php:
    build:
      context: ./php
      dockerfile: Dockerfile
    container_name: shortlinker_php
    volumes:
      - ../site:/var/www/short-linker.loc
      - ./php/php.ini:/usr/local/etc/php/php.ini
    working_dir: /var/www/short-linker.loc
    depends_on:
      - mariadb
    networks:
      - shortlinker_network
    environment:
      - PHP_IDE_CONFIG=serverName=shortlinker

  nginx:
    image: nginx:alpine
    container_name: shortlinker_nginx
    ports:
      - "${NGINX_PORT:-80}:80"
    volumes:
      - ../site:/var/www/short-linker.loc
      - ./nginx/nginx.conf.template:/etc/nginx/templates/default.conf.template
    environment:
      - APP_DOMAIN=${APP_DOMAIN:-short-linker.loc}
    depends_on:
      - php
    extra_hosts:
      - "${APP_DOMAIN:-short-linker.loc}:127.0.0.1"
    networks:
      - shortlinker_network

  mariadb:
    image: mariadb:11.4
    container_name: shortlinker_mariadb
    ports:
      - "${MARIADB_PORT:-3306}:3306"
    environment:
      - MYSQL_ROOT_PASSWORD=${MYSQL_ROOT_PASSWORD:-1}
      - MYSQL_DATABASE=${MYSQL_DATABASE:-shortlinker}
    volumes:
      - mariadb_data:/var/lib/mysql
    networks:
      - shortlinker_network

volumes:
  mariadb_data:

networks:
  shortlinker_network:
    driver: bridge
